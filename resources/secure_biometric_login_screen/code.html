<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Biometric Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "card-bg": "rgba(30, 41, 59, 0.4)",
                        "card-border": "rgba(255, 255, 255, 0.1)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    boxShadow: {
                        "glow": "0 0 20px -5px rgba(19, 91, 236, 0.5)",
                        "glow-lg": "0 0 40px -10px rgba(19, 91, 236, 0.6)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit to match the dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101622;
        }
        ::-webkit-scrollbar-thumb {
            background: #282e39;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b4354;
        }
        
        .glass-panel {
            background: rgba(16, 22, 34, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .fingerprint-scan {
            position: relative;
            overflow: hidden;
        }
        
        .fingerprint-scan::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #135bec;
            box-shadow: 0 0 8px #135bec;
            animation: scan 2s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white overflow-hidden">
<!-- Custom Title Bar for Electron Feel -->
<div class="flex items-center justify-between w-full h-8 px-4 bg-[#0a0e16] border-b border-[#1f2937] select-none drag-region">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-500 text-[14px]">shield</span>
<span class="text-xs font-medium text-slate-400 tracking-wide">InvoiceManager Secure Login</span>
</div>
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-yellow-500/20 hover:bg-yellow-500 transition-colors cursor-pointer"></div>
<div class="w-3 h-3 rounded-full bg-green-500/20 hover:bg-green-500 transition-colors cursor-pointer"></div>
<div class="w-3 h-3 rounded-full bg-red-500/20 hover:bg-red-500 transition-colors cursor-pointer"></div>
</div>
</div>
<!-- Main Content Area with Radial Gradient Background -->
<div class="flex-1 flex items-center justify-center relative p-6">
<!-- Abstract Background Gradients -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Login Card -->
<div class="w-full max-w-[420px] glass-panel rounded-2xl p-8 md:p-10 relative z-10 flex flex-col gap-6">
<!-- Logo & Header -->
<div class="flex flex-col items-center text-center gap-4">
<div class="size-12 bg-primary/10 rounded-xl flex items-center justify-center border border-primary/20 shadow-glow mb-2">
<svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<div>
<h1 class="text-2xl font-bold tracking-tight text-white mb-1">Welcome back</h1>
<p class="text-slate-400 text-sm font-medium">Secure Invoice Management System</p>
</div>
</div>
<!-- Main Form -->
<form class="flex flex-col gap-4" onsubmit="event.preventDefault();">
<div class="space-y-4">
<label class="block space-y-1.5">
<span class="text-xs font-semibold text-slate-300 uppercase tracking-wider pl-1">Work Email</span>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-[#1c1f27]/50 border border-[#3b4354] rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium" placeholder="name@company.com" type="email" value="alex.moran@invoicemanager.com"/>
</div>
</label>
<label class="block space-y-1.5">
<div class="flex justify-between items-center pl-1">
<span class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Password</span>
<a class="text-xs text-primary hover:text-primary/80 font-medium transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-[#1c1f27]/50 border border-[#3b4354] rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</label>
</div>
<button class="mt-2 w-full bg-primary hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg shadow-glow hover:shadow-glow-lg transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-700/50"></div>
<span class="flex-shrink-0 mx-4 text-xs font-medium text-slate-500 uppercase tracking-widest">Or login with</span>
<div class="flex-grow border-t border-slate-700/50"></div>
</div>
<!-- Biometric Section -->
<div class="flex flex-col items-center gap-4">
<button class="group relative flex flex-col items-center justify-center p-4 rounded-xl border border-dashed border-slate-600 hover:border-primary/50 hover:bg-primary/5 transition-all w-full cursor-pointer">
<div class="relative mb-2">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<div class="fingerprint-scan w-12 h-12 flex items-center justify-center text-primary group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[48px]">fingerprint</span>
</div>
</div>
<span class="text-sm font-medium text-slate-300 group-hover:text-white transition-colors">Touch ID / Biometric</span>
<span class="text-xs text-slate-500 mt-1">Waiting for sensor...</span>
</button>
<button class="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors py-1">
<span class="material-symbols-outlined text-[18px]">phonelink_lock</span>
<span>Use Authenticator App (MFA)</span>
</button>
</div>
<!-- Footer Security Badge -->
<div class="pt-2 mt-2 border-t border-slate-700/30 flex items-center justify-center gap-2 text-emerald-500/80">
<span class="material-symbols-outlined text-[14px]">lock</span>
<span class="text-[11px] font-medium tracking-wide uppercase">256-bit Encrypted Connection</span>
</div>
</div>
<!-- Floating Decorative Elements -->
<div class="absolute bottom-10 right-10 flex flex-col items-end gap-2 opacity-50 z-0 pointer-events-none">
<div class="text-[10px] text-slate-600 font-mono">Build v4.2.0 (Stable)</div>
<div class="text-[10px] text-slate-600 font-mono">Server: US-EAST-1</div>
</div>
</div>
</body></html>
